<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReBorn FC</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", Arial, sans-serif;
      background: linear-gradient(135deg, #0f4c27 0%, #1a6b3a 60%, #1a4b7a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 20px;
      padding: 48px 40px; width: 340px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo { font-size: 3rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; color: #1a4b7a; margin-bottom: 4px; font-weight: 700; }
    .sub { font-size: 0.85rem; color: #64748b; margin-bottom: 32px; }
    input[type=password] {
      width: 100%; padding: 14px 16px;
      font-size: 1.8rem; letter-spacing: 0.4em; text-align: center;
      border: 2px solid #d1d5db; border-radius: 10px;
      outline: none; margin-bottom: 16px;
    }
    input[type=password]:focus { border-color: #1a6b3a; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #0f4c27, #1a6b3a);
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.05em;
    }
    button:hover { opacity: 0.9; }
    .error {
      margin-top: 14px; color: #e74c3c;
      font-size: 0.88rem; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#9917;</div>
    <h1>ReBorn FC</h1>
    <p class="sub">東京都リーグ 3部 / Over 50</p>
    <input type="password" id="pw" placeholder="パスワード" maxlength="20"
           onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">入場</button>
    <div class="error" id="err">パスワードが違います</div>
  </div>
  <script>
    document.getElementById('pw').focus();
    // sessionStorageに認証済みフラグがあればそのまま通す
    if (sessionStorage.getItem('reborn_auth')) location.href = 'home.html';
    function check() {
      const pw = document.getElementById('pw').value;
      if (pw === '1234' || pw === '2345') {
        sessionStorage.setItem('reborn_auth', '1');
        if (pw === '2345') {
          localStorage.setItem('reborn_no_count', '1');
        } else {
          localStorage.removeItem('reborn_no_count');
        }
        location.href = 'home.html';
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
